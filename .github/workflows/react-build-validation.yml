name: React Build Validation

on:
  pull_request:
    branches:
      - develop-react
  push:
    branches:
      - develop-react
      - feature/v2-3-1-react-runtime-validation

jobs:
  build:
    name: Validate React/Vite build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build
